{% extends "admin_base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 md:px-6 py-8">
    <div class="flex items-center gap-3 mb-6">
        <a href="/cp" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors">
            <i class="fas fa-arrow-left text-xs"></i>
        </a>
        <div>
            <span class="inline-block bg-magenta/10 text-magenta text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-1">Catalog Management</span>
            <h1 class="text-2xl font-extrabold text-gray-800">Add New Book</h1>
        </div>
    </div>

    <form action="/cp/books/new" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 flex flex-col gap-6">
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
                <h3 class="font-bold text-xs text-gray-800 uppercase tracking-wider border-l-2 border-orangered pl-2 mb-2">Book Information</h3>
                
                <div>
                    <label for="title" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Book Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g. Fundo la Moyoni" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors">
                </div>

                <div>
                    <label for="authors" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Author(s)</label>
                    <input type="text" id="authors" name="authors" placeholder="e.g. Tunu Publishers" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors">
                </div>

                <div>
                    <label for="blurb" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Blurb / Description</label>
                    <textarea id="blurb" name="blurb" rows="6" placeholder="Write a short engaging summary of the book..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors resize-none"></textarea>
                </div>
            </div>

            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
                <h3 class="font-bold text-xs text-gray-800 uppercase tracking-wider border-l-2 border-orangered pl-2 mb-2">Target & Grading</h3>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="audience" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Target Audience</label>
                        <select id="audience" name="audience" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors bg-white appearance-none text-gray-700">
                            <option value="General">General Readers</option>
                            <option value="Students">Students</option>
                            <option value="Teachers">Teachers / Instructors</option>
                            <option value="Children">Children</option>
                        </select>
                    </div>
                    <div>
                        <label for="grade" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Education Grade / Category</label>
                        <select id="grade" name="grade" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors bg-white appearance-none text-gray-700">
                            <option value="General">General / Fiction</option>
                            <option value="Grade 1">Grade 1</option>
                            <option value="Grade 2">Grade 2</option>
                            <option value="Grade 3">Grade 3</option>
                            <option value="Grade 4">Grade 4</option>
                            <option value="Grade 5">Grade 5</option>
                            <option value="Grade 6">Grade 6</option>
                            <option value="Junior Secondary">Junior Secondary</option>
                            <option value="Secondary">Senior Secondary</option>
                            <option value="Adult">Adult / Tertiary</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-1 flex flex-col gap-6">
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
                <h3 class="font-bold text-xs text-gray-800 uppercase tracking-wider border-l-2 border-orangered pl-2 mb-2">Cover Artwork</h3>
                
                <div class="flex flex-col items-center gap-4">
                    <div class="w-36 h-48 rounded-xl bg-lightWarm border border-gray-200 overflow-hidden flex items-center justify-center relative shadow-inner">
                        <img id="cover-preview" src="https://placehold.co/150x200/F5F5DC/8B008B?text=No+Cover" alt="Cover Preview" class="w-full h-full object-contain p-2">
                    </div>
                    
                    <div class="w-full">
                        <label class="block w-full text-center border border-dashed border-gray-300 hover:border-magenta hover:bg-magenta/5 transition-all cursor-pointer py-3 px-4 rounded-xl text-xs font-bold text-gray-600">
                            <i class="fas fa-cloud-upload-alt mr-1 text-magenta"></i> Upload Cover Image
                            <input type="file" id="image" name="image" accept="image/*" class="hidden" onchange="previewImage(event)">
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col gap-4">
                <h3 class="font-bold text-xs text-gray-800 uppercase tracking-wider border-l-2 border-orangered pl-2 mb-2">Pricing Details</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="oldPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Original (KSh)</label>
                        <input type="number" id="oldPrice" name="oldPrice" min="0" value="0" step="1" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors">
                    </div>
                    <div>
                        <label for="newPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Selling (KSh)</label>
                        <input type="number" id="newPrice" name="newPrice" min="0" required value="0" step="1" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-xs outline-none focus:border-magenta transition-colors">
                    </div>
                </div>

                <label class="flex items-center gap-2.5 mt-2 cursor-pointer select-none">
                    <input type="checkbox" id="discounted" name="discounted" value="true" class="w-4 h-4 rounded text-magenta border-gray-300 focus:ring-magenta">
                    <span class="text-xs font-semibold text-gray-600">Mark as discounted offer</span>
                </label>
            </div>

            <div class="flex flex-col gap-3">
                <button type="submit" class="w-full bg-magenta hover:bg-dark-magenta text-white font-bold text-xs uppercase tracking-wider py-4 rounded-full shadow-md transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i> Save and Publish
                </button>
                <a href="/cp" class="w-full inline-block text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xs uppercase tracking-wider py-4 rounded-full transition-colors">
                    Cancel
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('cover-preview');
            output.src = reader.result;
        };
        if (event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>
{% endblock %}
